services:
  postgres:
    image: postgres:16
    container_name: interview-postgres
    environment:
      POSTGRES_DB: interview
      POSTGRES_USER: interview
      POSTGRES_PASSWORD: interview
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U interview -d interview"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: interview-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/interview
      SPRING_DATASOURCE_USERNAME: interview
      SPRING_DATASOURCE_PASSWORD: interview
      INTERVIEW_CONTENT_PATH: /app/content
      INTERVIEW_SANDBOX_URL: http://sandbox-runner:8081
      INTERVIEW_CORS_ALLOWED_ORIGINS: http://localhost:5173
    ports:
      - "8080:8080"
    volumes:
      - ./content:/app/content:ro

  sandbox-runner:
    build:
      context: ./sandbox-runner
    container_name: interview-sandbox-runner
    ports:
      - "8081:8081"

  frontend:
    build:
      context: ./frontend
    container_name: interview-frontend
    depends_on:
      - backend
    ports:
      - "5173:80"

